<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --accent-primary: #10B981;
            --accent-secondary: #3B82F6;
            --bg-dark: #070B14;
        }
        body {
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .feature-icon {
            color: #fff;
        }
        svg {
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
        <defs>
            <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="var(--accent-primary)" />
                <stop offset="100%" stop-color="var(--accent-secondary)" />
            </linearGradient>
        </defs>
    </svg>

    <!-- Original broken version -->
    <div class="feature-icon" style="margin-right: 50px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#icon-gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8V4H8"></path>
            <rect x="4" y="8" width="16" height="12" rx="2"></rect>
            <path d="M2 14h2"></path><path d="M20 14h2"></path>
            <circle cx="9" cy="13" r="1" fill="url(#icon-gradient)" stroke="none"></circle>
            <circle cx="15" cy="13" r="1" fill="url(#icon-gradient)" stroke="none"></circle>
            <line x1="10" y1="17" x2="14" y2="17" stroke="url(#icon-gradient)"></line>
        </svg>
    </div>

    <!-- New single path version -->
    <div class="feature-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#icon-gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <!-- M12 8V4H8 is the antenna -->
            <!-- The body is M4 10a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z -->
            <!-- The ears are M2 14h2 M20 14h2 -->
            <!-- The eyes are M9 13v0.01 M15 13v0.01 -->
            <!-- The mouth is M10 17h4 -->
            <path d="M12 8V4H8 M2 14h2 M20 14h2 M4 10a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z M9 13v0.01 M15 13v0.01 M10 17h4"></path>
        </svg>
    </div>
</body>
</html>
