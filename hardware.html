<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="AI Rigs - High-performance AI workstations uniquely customized for your machine learning and deep learning workloads." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <title>Hardware | AI Rigs</title>
</head>

<body>
  <!-- Header (injected via JS) -->
  <header class="header"></header>

  <!-- Base Models -->
  <section class="products" id="workstations">
    <div class="container">
      <div class="catalog-header">



      </div>

      <div class="catalog-layout">
        <!-- Sidebar Filters -->
        <aside class="catalog-sidebar">
          <div class="filter-section">
            <h3 class="filter-title">Budget (€)</h3>
            <div class="budget-inputs">
              <input type="number" id="min-budget" value="2500" min="2500" max="50000" step="500">
              <span>-</span>
              <div class="max-budget-wrapper">
                <input type="number" id="max-budget" value="6500" min="2500" max="50000" step="500">
                <span id="max-budget-plus" class="hidden">+</span>
              </div>
            </div>
            <div class="range-slider-wrapper slider-pending">
              <div class="range-slider-track" id="slider-track" style="opacity:0"></div>
              <input type="range" id="budget-slider-min" class="dual-range" min="2500" max="50000" step="500"
                value="2500">
              <input type="range" id="budget-slider-max" class="dual-range" min="2500" max="50000" step="500"
                value="6500">
            </div>
          </div>

          <div class="filter-section">
            <h3 class="filter-title">
              Primary use case
            </h3>
            <div class="checkbox-group">
              <input type="checkbox" id="uc-finetune" value="textual,visual" class="use-case-cb">
              <label for="uc-finetune">AI model fine-tuning</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="uc-agentic" value="textual" class="use-case-cb">
              <label for="uc-agentic">Agentic engineering</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="uc-chatbot" value="textual,audio" class="use-case-cb">
              <label for="uc-chatbot">Chatbots</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="uc-doc" value="textual" class="use-case-cb">
              <label for="uc-doc">Document analysis/summarization</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="uc-obj" value="visual" class="use-case-cb">
              <label for="uc-obj">Object detection/recognition</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="uc-video" value="visual" class="use-case-cb">
              <label for="uc-video">Video/image generation</label>
            </div>
          </div>

          <div class="filter-section">
            <h3 class="filter-title">
              <span class="spec-tooltip">
                Deployment type
                <svg class="tooltip-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                  <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span class="tooltip-content"><b>Experimentation/POC</b><br>For validation of ideas — choose between
                  prioritizing model speed or output quality.<br><br>
                  <b>Production</b><br>For user-facing workloads — a good balance between model
                  speed and output quality.
                </span>
              </span>
            </h3>
            <div class="checkbox-group">
              <input type="checkbox" id="dep-poc" value="single" class="deployment-cb" checked>
              <label for="dep-poc">Experimentation/POC</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="dep-prod" value="multiple" class="deployment-cb">
              <label for="dep-prod">Production</label>
            </div>
          </div>

          <div class="filter-section">
            <h3 class="filter-title">Order by</h3>
            <select id="sort-by" class="filter-select">
              <option value="relevance" selected>Product relevance</option>
              <option value="price-asc">Price (Low to High)</option>
              <option value="price-desc">Price (High to Low)</option>
            </select>
          </div>
        </aside>

        <!-- Main Products Content -->
        <div class="catalog-main">

          <div class="products-grid" id="products-grid">
            <!-- Products will be dynamically rendered here -->
          </div>

          <!-- Product Card Template -->
          <template id="product-card-template">
            <div class="product-card">
              <div class="product-image">
                <img src="" alt="" class="product-img">
              </div>
              <div class="product-content">
                <h3 class="product-title"></h3>
                <p class="product-description"></p>
                <ul class="product-specs">
                  <li data-spec="memoryCapacity"></li>
                  <li data-spec="memoryBandwidth"></li>
                  <li data-spec="performance"></li>
                </ul>
                <div class="product-footer">
                  <span class="price-tag"></span>
                  <a href="contact.html" class="btn btn-primary">Request Details</a>
                </div>
              </div>
            </div>
          </template>

          <!-- Spec Tooltip Template -->
          <template id="spec-tooltip-template">
            <strong>
              <span class="spec-tooltip">
                <span class="spec-label" style="white-space: nowrap;"></span>
                <span class="tooltip-content"></span>
              </span>:
            </strong>
            <span class="spec-value"></span>
          </template>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer (injected via JS) -->
  <footer class="footer"></footer>

  <script type="module" src="./main.js"></script>
</body>

</html>
