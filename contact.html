<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      if (savedTheme === 'light' || (!savedTheme && prefersLight)) {
        document.documentElement.classList.add('light-theme');
      }
      document.documentElement.classList.add('no-initial-transitions');
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Contact AI Rigs — Tell us your AI workload requirements and we'll architect the ideal hardware and software stack for you." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <title>Contact Us | AI Rigs</title>
</head>

<body>
  <!-- Header (injected via JS) -->
  <header class="header"></header>

  <!-- Lead Generation Form Section -->
  <section class="lead-section" id="lead-form" style="padding-top: 8rem; position: relative; overflow: hidden;">
    <div class="container" style="position: relative; z-index: 2;">
      <div class="lead-container">
        <div class="lead-info">
          <h2>Your succesful AI workflows are<br> only one step away.</h2>
          <p>Contact us now and discover the optimal solution for your needs.</p>
          <ul class="lead-benefits">
            <li>Response within 2 business days</li>
            <li>Free initial consultation</li>
            <li>Transparent pricing scheme</li>
          </ul>
        </div>
        <div class="lead-form-wrapper">
          <form id="aiRigForm" class="custom-form">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required placeholder="Jane Doe">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required placeholder="jane@company.com">
            </div>
            <div class="form-group">
              <label for="usecase">Primary Use Case</label>
              <select id="usecase" name="usecase" required>
                <option value="" disabled selected>Select your primary workload</option>
                <option value="uc-finetune">AI model fine-tuning</option>
                <option value="uc-agentic">Agentic engineering</option>
                <option value="uc-chatbot">Chatbots</option>
                <option value="uc-doc">Document analysis/summarization</option>
                <option value="uc-obj">Object detection/recognition</option>
                <option value="uc-video">Video/image generation</option>
                <option value="other">Other (please provide details below)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="details">Workflow Details</label>
              <textarea id="details" name="details" rows="4" placeholder="Tell us more about your goals, preferences and constraints.
The more details you provide, the better we can assist you."></textarea>
            </div>

            <input type="hidden" id="budget" name="budget" value="">
            <input type="hidden" id="deployment" name="deployment" value="">
            <input type="hidden" id="hardware" name="hardware" value="">

            <button type="submit" class="btn btn-primary btn-block">Submit</button>
            <div id="formSuccess" class="form-success hidden">
              Thank you! Our engineers will review your needs and contact you shortly.
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer (injected via JS) -->
  <footer class="footer"></footer>

  <script type="module" src="./main.js"></script>
</body>

</html>
